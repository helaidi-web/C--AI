<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Authentication - Modern Login & Signup</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <!-- Left side: Branding -->
    <div class="left-section">
      <div class="branding">
        <h1 class="logo">AUTH</h1>
        <p class="tagline">Secure & Modern Authentication</p>
        <div class="decorative-circles"></div>
      </div>
    </div>

    <!-- Right side: Form -->
    <div class="right-section">
      <div class="form-container">
        <!-- Toggle between Login and Signup -->
        <div class="form-toggle">
          <button id="loginToggle" class="toggle-btn active">Login</button>
          <button id="signupToggle" class="toggle-btn">Sign Up</button>
        </div>

        <!-- Login Form -->
        <div id="loginForm" class="form-wrapper active">
          <h2>Welcome Back</h2>
          <p class="form-subtitle">Enter your credentials to continue</p>

          <form id="login-form">
            <div class="form-group">
              <label for="loginEmail">Email Address</label>
              <input
                type="email"
                id="loginEmail"
                placeholder="you@example.com"
                required
              >
              <span class="error-message" id="loginEmailError"></span>
            </div>

            <div class="form-group">
              <label for="loginPassword">Password</label>
              <input
                type="password"
                id="loginPassword"
                placeholder="Enter your password"
                required
              >
              <span class="error-message" id="loginPasswordError"></span>
            </div>

            <div class="remember-me">
              <input type="checkbox" id="rememberMe">
              <label for="rememberMe">Remember me</label>
            </div>

            <button type="submit" class="btn btn-primary">
              <span class="btn-text">Login</span>
              <span class="loading-spinner" style="display: none;"></span>
            </button>

            <p class="form-error" id="loginError"></p>
          </form>
        </div>

        <!-- Signup Form -->
        <div id="signupForm" class="form-wrapper">
          <h2>Create Account</h2>
          <p class="form-subtitle">Join us today</p>

          <form id="signup-form">
            <div class="form-group">
              <label for="signupName">Full Name</label>
              <input
                type="text"
                id="signupName"
                placeholder="John Doe"
                required
              >
              <span class="error-message" id="signupNameError"></span>
            </div>

            <div class="form-group">
              <label for="signupEmail">Email Address</label>
              <input
                type="email"
                id="signupEmail"
                placeholder="you@example.com"
                required
              >
              <span class="error-message" id="signupEmailError"></span>
            </div>

            <div class="form-group">
              <label for="signupPassword">Password</label>
              <input
                type="password"
                id="signupPassword"
                placeholder="Min. 6 characters"
                required
              >
              <span class="error-message" id="signupPasswordError"></span>
            </div>

            <div class="form-group">
              <label for="signupConfirmPassword">Confirm Password</label>
              <input
                type="password"
                id="signupConfirmPassword"
                placeholder="Confirm your password"
                required
              >
              <span class="error-message" id="signupConfirmPasswordError"></span>
            </div>

            <div class="terms">
              <input type="checkbox" id="agreeTerms" required>
              <label for="agreeTerms">I agree to the Terms & Conditions</label>
            </div>

            <button type="submit" class="btn btn-primary">
              <span class="btn-text">Sign Up</span>
              <span class="loading-spinner" style="display: none;"></span>
            </button>

            <p class="form-error" id="signupError"></p>
          </form>
        </div>

        <!-- Success Message -->
        <div class="success-message" id="successMessage">
          <span class="success-icon">✓</span>
          <p id="successText"></p>
        </div>
      </div>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.4.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.4.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.4.0/firebase-firestore.js"></script>

  <!-- Our Scripts -->
  <script src="firebase.js"></script>
  <script src="app.js"></script>
</body>
</html>
